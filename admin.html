<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Learning Tracker</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fffdf7;
      --border: #c8b89a;
      --accent: #2d5a27;
      --accent-light: #4a8c42;
      --text: #1a1a1a;
      --text-muted: #666;
      --danger: #c0392b;
      --danger-light: #fadbd8;
      --warn: #e67e22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a3d15;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.4rem; letter-spacing: 0.5px; }
    header .subtitle { font-size: 0.85rem; opacity: 0.7; font-style: italic; }

    nav {
      background: #2d5a27;
      padding: 0.5rem 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    nav a {
      color: #c8e6c4; text-decoration: none;
      font-family: monospace; font-size: 0.9rem;
      padding: 0.2rem 0.5rem; border-radius: 3px;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--accent); color: #fff;
      padding: 0.6rem 1.2rem; border-radius: 5px;
      font-family: monospace; font-size: 0.9rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── Main layout ── */
    main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

    .admin-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }

    .admin-section-header {
      background: #ede8dc;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .admin-section-header h2 {
      font-size: 1rem;
      color: var(--accent);
      flex: 1;
    }

    .admin-section-body { padding: 1.2rem; }

    /* ── GitHub section ── */
    .github-row {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
    }
    .github-row input {
      flex: 1; min-width: 200px;
      font-family: monospace; font-size: 0.95rem;
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .github-row input:focus { outline: 2px solid var(--accent-light); }

    /* ── Buttons ── */
    .btn {
      font-family: monospace; font-size: 0.85rem;
      padding: 0.45rem 0.9rem; border-radius: 4px;
      cursor: pointer; border: 1px solid transparent;
      transition: filter 0.15s;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(0.92); }
    .btn-primary { background: var(--accent); color: #fff; border-color: #1a3d15; }
    .btn-secondary { background: #e8e0d0; color: var(--text); border-color: var(--border); }
    .btn-danger  { background: var(--danger-light); color: var(--danger); border-color: #e8a8a0; }
    .btn-add     { background: #e8f4e8; color: var(--accent); border-color: var(--accent-light); font-size: 0.82rem; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.78rem; }

    /* ── Topic rows ── */
    .topic-list { display: flex; flex-direction: column; }

    .topic-row {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 1.2rem;
      border-bottom: 1px solid #ede8dc;
      transition: background 0.15s;
    }
    .topic-row:last-child { border-bottom: none; }
    .topic-row:hover { background: #faf6ee; }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.15);
    }
    .status-dot.not-started { background: #ddd; }
    .status-dot.in-progress { background: #f4c842; }
    .status-dot.done        { background: #4a8c42; }

    .topic-title { flex: 1; font-size: 0.95rem; font-weight: bold; }

    .status-badge {
      font-family: monospace; font-size: 0.72rem;
      padding: 0.15rem 0.5rem; border-radius: 3px;
    }
    .status-badge.not-started { background: #eee;     color: #888; }
    .status-badge.in-progress { background: #fef9e7;  color: #b7770d; border: 1px solid #f4c842; }
    .status-badge.done        { background: #e8f4e8;  color: #2d5a27; border: 1px solid #4a8c42; }

    .row-actions { display: flex; gap: 0.4rem; }

    /* ── Edit form ── */
    .topic-edit-form {
      border-bottom: 1px solid var(--border);
      background: #faf8f3;
      padding: 1.2rem 1.4rem;
    }

    .form-row {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label {
      font-size: 0.72rem; font-family: monospace;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .form-group input, .form-group select {
      font-family: Georgia, serif; font-size: 0.95rem;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .form-group input:focus, .form-group select:focus {
      outline: 2px solid var(--accent-light);
    }
    .form-group.grow { flex: 1; min-width: 200px; }
    .form-group.grow input { width: 100%; }

    /* ── Tag sections ── */
    .tag-sections { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }

    .tag-section-block {}

    .tag-section-label {
      font-size: 0.72rem; font-family: monospace;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.4rem;
    }

    .pills-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; min-height: 1.6rem; }

    .pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: monospace; font-size: 0.8rem;
      padding: 0.2rem 0.3rem 0.2rem 0.55rem;
      border-radius: 3px;
    }
    .pill.learn   { background: #e8f4e8; border: 1px solid #4a8c42; color: #1a4d18; }
    .pill.done    { background: #e8f0fa; border: 1px solid #3d72c4; color: #1a3a6e; }
    .pill.project { background: #fdf3e8; border: 1px solid #c4843d; color: #5a3d18; }

    .pill-remove {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; line-height: 1; color: inherit;
      opacity: 0.5; padding: 0 0.1rem;
    }
    .pill-remove:hover { opacity: 1; }

    .tag-input-row { display: flex; gap: 0.4rem; }
    .tag-input-row input {
      flex: 1; font-family: monospace; font-size: 0.85rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .tag-input-row input:focus { outline: 2px solid var(--accent-light); }

    .form-actions { display: flex; gap: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #e8e0d0; }

    /* ── Add-topic strip ── */
    .add-strip {
      padding: 0.7rem 1.2rem;
      border-top: 1px dashed var(--border);
      display: flex; gap: 0.5rem;
    }

    /* ── Export/Import ── */
    .io-section {
      display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center;
    }
    .io-section p { font-size: 0.85rem; color: var(--text-muted); font-style: italic; flex: 1; min-width: 200px; }

    /* ── Empty state ── */
    .empty-state {
      padding: 1.5rem; text-align: center;
      font-style: italic; color: var(--text-muted); font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Admin Panel</h1>
    <div class="subtitle">Learning Tracker</div>
  </div>
</header>

<nav>
  <a href="index.html">← View Site</a>
  <span style="color:#c8e6c4;opacity:0.4">|</span>
  <a href="#github-section">GitHub URL</a>
  <a href="#topics-section">Topics</a>
  <a href="#books-section">Books &amp; Certs</a>
  <a href="projects.html">Boss Projects</a>
  <a href="#io-section">Export / Import</a>
</nav>

<div id="toast"></div>

<main>

  <!-- ── GitHub URL ── -->
  <div class="admin-section" id="github-section">
    <div class="admin-section-header">
      <h2>GitHub URL</h2>
    </div>
    <div class="admin-section-body">
      <div class="github-row">
        <input type="url" id="github-input" placeholder="https://github.com/your-username" />
        <button class="btn btn-primary" onclick="saveGithub()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Topics ── -->
  <div class="admin-section" id="topics-section">
    <div class="admin-section-header">
      <h2>Learning Topics</h2>
    </div>
    <div class="topic-list" id="topics-list"></div>
    <div class="add-strip">
      <button class="btn btn-add" onclick="addTopic('topics')">+ Add Topic</button>
    </div>
  </div>

  <!-- ── Books & Certs ── -->
  <div class="admin-section" id="books-section">
    <div class="admin-section-header">
      <h2>Books &amp; Certifications</h2>
    </div>
    <div class="topic-list" id="books-list"></div>
    <div class="add-strip">
      <button class="btn btn-add" onclick="addTopic('books-certs')">+ Add Book / Cert</button>
    </div>
  </div>

  <!-- ── Export / Import ── -->
  <div class="admin-section" id="io-section">
    <div class="admin-section-header">
      <h2>Export &amp; Import</h2>
    </div>
    <div class="admin-section-body">
      <div class="io-section">
        <p>Back up your data as a JSON file, or restore from a previous backup.</p>
        <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
        <label class="btn btn-secondary" style="cursor:pointer">
          Import JSON
          <input type="file" accept=".json" style="display:none" onchange="importData(event)">
        </label>
        <button class="btn btn-danger btn-sm" onclick="resetDefaults()">Reset to defaults</button>
      </div>
    </div>
  </div>

</main>

<script>
  /* ─── DEFAULT DATA (same as index.html) ─── */
  const DEFAULT_DATA = {
    github: "https://github.com/Veekash2",
    topics: [
      { id:"networking",    title:"Networking",                    status:"not-started", group:"topics",
        learned:[], toLearn:["OSI Model","TCP/IP","DNS & DHCP","Subnetting","Firewalls & VPNs"], projects:[] },
      { id:"docker",        title:"Docker",                        status:"not-started", group:"topics",
        learned:[], toLearn:["Containers vs VMs","Dockerfile","Docker Compose","Volumes & Networks","Docker Hub"], projects:[] },
      { id:"ai-codebases",  title:"AI to Understand Codebases",    status:"in-progress", group:"topics",
        learned:["Claude Code basics","Prompting for code"], toLearn:["Codebase indexing","AI-assisted debugging","AI code review workflows"], projects:["Deelytefool admin site","Rick & Morty Tracker"] },
      { id:"frontend",      title:"Frontend",                      status:"in-progress", group:"topics",
        learned:["HTML basics","CSS basics"], toLearn:["JavaScript fundamentals","Responsive design","Accessibility (a11y)","Web performance"], projects:["This learning tracker"] },
      { id:"react",         title:"React",                         status:"not-started", group:"topics",
        learned:[], toLearn:["Components & JSX","State & Props","Hooks (useState, useEffect)","React Router","Context API"], projects:[] },
      { id:"architecture",  title:"Architecture",                  status:"not-started", group:"topics",
        learned:[], toLearn:["MVC / MVVM","Microservices","REST vs GraphQL","System design basics","Event-driven architecture"], projects:[] },
      { id:"hardware",      title:"Hardware",                      status:"not-started", group:"topics",
        learned:[], toLearn:["CPU & memory","Storage types (SSD/NVMe)","How servers work"], projects:[] },
      { id:"linux",         title:"Linux OS",                      status:"not-started", group:"topics",
        learned:[], toLearn:["CLI basics","File permissions","Shell scripting (bash)","Process management","SSH & remote access"], projects:[] },
      { id:"scaling",       title:"Scaling & Cost Management",     status:"not-started", group:"topics",
        learned:[], toLearn:["Horizontal vs vertical scaling","Load balancing","Cloud cost optimisation","Caching strategies"], projects:[] },
      { id:"security",      title:"Security / Cybersecurity",      status:"not-started", group:"topics",
        learned:[], toLearn:["OWASP Top 10","Auth & OAuth2","SQL Injection basics","HTTPS / TLS","Penetration testing basics"], projects:[] },
      { id:"java",          title:"Java",                          status:"not-started", group:"topics",
        learned:[], toLearn:["OOP fundamentals","Collections & Generics","Spring Boot","JUnit testing","Maven / Gradle"], projects:[] },
      { id:"sql-databases",  title:"SQL & Databases",              status:"not-started", group:"topics",
        learned:[], toLearn:["SQL basics","Joins & subqueries","Indexes","Transactions","NoSQL basics","PostgreSQL / MySQL","ORM concepts"], projects:[] },
      { id:"testing",        title:"Testing",                      status:"not-started", group:"topics",
        learned:[], toLearn:["Unit testing","Integration testing","End-to-end testing","TDD","Mocking","Code coverage"], projects:[] },
      { id:"git-workflows",  title:"Git & Version Control",        status:"not-started", group:"topics",
        learned:[], toLearn:["Branching strategies","Pull requests","Rebasing vs merging","Git hooks","Conventional commits","Resolving conflicts"], projects:[] },
      { id:"debugging",      title:"Debugging",                    status:"not-started", group:"topics",
        learned:[], toLearn:["Reading stack traces","Browser DevTools","Debugger usage","Logging strategies","Root cause analysis"], projects:[] },
      { id:"code-reviews",   title:"Code Reviews & Reading Code",  status:"not-started", group:"topics",
        learned:[], toLearn:["Reviewing PRs effectively","Reading unfamiliar codebases","Giving constructive feedback","Open source contributions"], projects:[] },
      { id:"tech-docs",      title:"Technical Documentation",      status:"not-started", group:"topics",
        learned:[], toLearn:["Writing READMEs","API documentation","Architecture decision records (ADRs)","Diagrams (UML, C4)","Confluence / Notion"], projects:[] },
      { id:"estimation",     title:"Estimating & Task Breakdown",  status:"not-started", group:"topics",
        learned:[], toLearn:["Breaking epics into tasks","Story points","T-shirt sizing","Identifying unknowns","Planning poker"], projects:[] },
      { id:"cicd",           title:"CI/CD Pipelines",              status:"not-started", group:"topics",
        learned:[], toLearn:["GitHub Actions","Build automation","Automated testing in CI","Deployment pipelines","Environment management","Release strategies"], projects:[] },
      { id:"cloud-basics",   title:"Cloud Basics (AWS / GCP)",     status:"not-started", group:"topics",
        learned:[], toLearn:["Compute (EC2 / Cloud Run)","Storage (S3 / Cloud Storage)","Databases (RDS / Cloud SQL)","IAM & permissions","Serverless functions","Regions & availability zones"], projects:[] },
      { id:"api-design",     title:"API Design",                   status:"not-started", group:"topics",
        learned:[], toLearn:["REST principles","HTTP methods & status codes","Versioning","Authentication (API keys, OAuth)","Rate limiting","OpenAPI / Swagger"], projects:[] },
      { id:"authentication", title:"Authentication",               status:"not-started", group:"topics",
        learned:[], toLearn:["Session vs JWT","OAuth2 & OpenID Connect","Password hashing (bcrypt/argon2)","MFA & TOTP","Social login (Google/GitHub)","RBAC & permissions","Refresh tokens & PKCE","Cookie security (SameSite, HttpOnly)","SSO","Passkeys / WebAuthn"], projects:[] },
      { id:"clean-code",    title:"Clean Code — Robert C. Martin", status:"not-started", group:"books-certs",
        learned:[], toLearn:["Meaningful names","Functions","Comments","Error handling","Unit tests","Classes","SOLID Principles","Design Patterns","Advanced TDD","Clean Architecture","Component Design","Functional Programming"], projects:["cleancoders.com/library/all"] },
      { id:"azure-certs",   title:"Azure Certifications",          status:"not-started", group:"books-certs",
        learned:[], toLearn:["AZ-900 Fundamentals","AZ-204 Developer","AZ-104 Administrator"], projects:["Microsoft Learn"] },
      { id:"agile",         title:"Agile",                         status:"not-started", group:"books-certs",
        learned:[], toLearn:["Scrum framework","Kanban","Sprint planning","Retrospectives","User stories","Agile manifesto & values"], projects:["PSM I (Scrum.org)"] }
    ]
  };

  /* ─── State ─── */
  let data = loadData();

  function loadData() {
    try {
      const s = localStorage.getItem('learningData');
      return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }

  function saveData() {
    localStorage.setItem('learningData', JSON.stringify(data));
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  /* ─── GitHub ─── */
  function saveGithub() {
    data.github = document.getElementById('github-input').value.trim() || data.github;
    saveData();
    toast('GitHub URL saved.');
  }

  /* ─── Render helpers ─── */
  function statusLabel(s) {
    const map = { 'not-started':'Not started', 'in-progress':'In progress', 'done':'Done' };
    return map[s] || s;
  }

  function renderTopicRow(topic) {
    return `<div class="topic-row" id="topic-row-${esc(topic.id)}">
      <span class="status-dot ${esc(topic.status)}"></span>
      <span class="topic-title">${esc(topic.title)}</span>
      <span class="status-badge ${esc(topic.status)}">${statusLabel(topic.status)}</span>
      <div class="row-actions">
        <button class="btn btn-secondary btn-sm" onclick="editTopic('${esc(topic.id)}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTopic('${esc(topic.id)}')">Delete</button>
      </div>
    </div>`;
  }

  function pillsHtml(topic, field) {
    const typeMap = { learned:'done', toLearn:'learn', projects:'project' };
    const cls = typeMap[field] || 'learn';
    const items = topic[field] || [];
    if (!items.length) return '<span style="font-size:0.8rem;color:#aaa;font-style:italic">None yet</span>';
    return items.map((tag, i) =>
      `<span class="pill ${cls}">${esc(tag)}<button class="pill-remove" onclick="removeTag('${esc(topic.id)}','${field}',${i})" title="Remove">×</button></span>`
    ).join('');
  }

  function renderEditForm(topic) {
    const isBooks = topic.group === 'books-certs';
    const sectionLabels = isBooks
      ? ['Learned / Achieved', 'Key areas to cover', 'Resources & certifications']
      : ['Learned so far', 'Want to learn', 'Projects tried'];
    const fields = ['learned', 'toLearn', 'projects'];

    const tagSections = fields.map((f, i) => `
      <div class="tag-section-block">
        <div class="tag-section-label">${sectionLabels[i]}</div>
        <div class="pills-row" id="pills-${esc(topic.id)}-${f}">${pillsHtml(topic, f)}</div>
        <div class="tag-input-row">
          <input type="text" id="input-${esc(topic.id)}-${f}" placeholder="Type and press Enter or Add..."
            onkeydown="if(event.key==='Enter'){event.preventDefault();addTag('${esc(topic.id)}','${f}');}">
          <button class="btn btn-add btn-sm" onclick="addTag('${esc(topic.id)}','${f}')">Add</button>
        </div>
      </div>`).join('');

    return `<div class="topic-edit-form" id="topic-form-${esc(topic.id)}">
      <div class="form-row">
        <div class="form-group grow">
          <label>Title</label>
          <input type="text" id="title-input-${esc(topic.id)}" value="${esc(topic.title)}">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status-select-${esc(topic.id)}">
            <option value="not-started" ${topic.status==='not-started'?'selected':''}>Not started</option>
            <option value="in-progress" ${topic.status==='in-progress'?'selected':''}>In progress</option>
            <option value="done"        ${topic.status==='done'       ?'selected':''}>Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Section</label>
          <select id="group-select-${esc(topic.id)}">
            <option value="topics"      ${topic.group==='topics'     ?'selected':''}>Topics</option>
            <option value="books-certs" ${topic.group==='books-certs'?'selected':''}>Books &amp; Certs</option>
          </select>
        </div>
      </div>

      <div class="tag-sections">${tagSections}</div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveTopic('${esc(topic.id)}')">Save</button>
        <button class="btn btn-secondary" onclick="cancelEdit('${esc(topic.id)}')">Cancel</button>
      </div>
    </div>`;
  }

  /* ─── Render page ─── */
  function renderPage() {
    document.getElementById('github-input').value = data.github || '';

    renderList('topics');
    renderList('books-certs');
  }

  function renderList(group) {
    const listId = group === 'topics' ? 'topics-list' : 'books-list';
    const listEl = document.getElementById(listId);
    const items = data.topics.filter(t => t.group === group);

    if (!items.length) {
      listEl.innerHTML = '<div class="empty-state">No entries yet — click the button below to add one.</div>';
      return;
    }
    listEl.innerHTML = items.map(renderTopicRow).join('');
  }

  /* ─── Edit / Save / Cancel ─── */
  function editTopic(id) {
    const topic = data.topics.find(t => t.id === id);
    if (!topic) return;
    const rowEl = document.getElementById('topic-row-' + id);
    if (!rowEl) return;
    rowEl.outerHTML = renderEditForm(topic);
    document.getElementById('title-input-' + id).focus();
  }

  function saveTopic(id) {
    const topic = data.topics.find(t => t.id === id);
    if (!topic) return;

    const newTitle  = (document.getElementById('title-input-'  + id)?.value || '').trim();
    const newStatus = document.getElementById('status-select-' + id)?.value;
    const newGroup  = document.getElementById('group-select-'  + id)?.value;

    if (newTitle)  topic.title  = newTitle;
    if (newStatus) topic.status = newStatus;
    if (newGroup && newGroup !== topic.group) {
      topic.group = newGroup;
      saveData();
      renderList('topics');
      renderList('books-certs');
      toast('Saved.');
      return;
    }

    saveData();

    const formEl = document.getElementById('topic-form-' + id);
    if (formEl) formEl.outerHTML = renderTopicRow(topic);
    toast('Saved.');
  }

  function cancelEdit(id) {
    const topic = data.topics.find(t => t.id === id);
    const formEl = document.getElementById('topic-form-' + id);
    if (formEl && topic) formEl.outerHTML = renderTopicRow(topic);
  }

  function deleteTopic(id) {
    const topic = data.topics.find(t => t.id === id);
    if (!topic) return;
    if (!confirm(`Delete "${topic.title}"? This cannot be undone.`)) return;
    data.topics = data.topics.filter(t => t.id !== id);
    saveData();
    const el = document.getElementById('topic-row-' + id) || document.getElementById('topic-form-' + id);
    if (el) el.remove();
    const group = topic.group;
    const listId = group === 'topics' ? 'topics-list' : 'books-list';
    const listEl = document.getElementById(listId);
    if (listEl && !listEl.children.length) {
      listEl.innerHTML = '<div class="empty-state">No entries yet — click the button below to add one.</div>';
    }
    toast('Deleted.');
  }

  /* ─── Tags ─── */
  function addTag(topicId, field) {
    const inputEl = document.getElementById('input-' + topicId + '-' + field);
    if (!inputEl) return;
    const value = inputEl.value.trim();
    if (!value) return;
    const topic = data.topics.find(t => t.id === topicId);
    if (!topic) return;
    if (!topic[field]) topic[field] = [];
    topic[field].push(value);
    inputEl.value = '';
    saveData();
    document.getElementById('pills-' + topicId + '-' + field).innerHTML = pillsHtml(topic, field);
    inputEl.focus();
  }

  function removeTag(topicId, field, index) {
    const topic = data.topics.find(t => t.id === topicId);
    if (!topic || !topic[field]) return;
    topic[field].splice(index, 1);
    saveData();
    document.getElementById('pills-' + topicId + '-' + field).innerHTML = pillsHtml(topic, field);
  }

  /* ─── Add topic ─── */
  function addTopic(group) {
    const newId = 'topic-' + Date.now();
    const newTopic = {
      id: newId,
      title: 'New Topic',
      status: 'not-started',
      group: group,
      learned: [],
      toLearn: [],
      projects: []
    };
    data.topics.push(newTopic);
    saveData();

    const listId = group === 'topics' ? 'topics-list' : 'books-list';
    const listEl = document.getElementById(listId);

    const emptyEl = listEl.querySelector('.empty-state');
    if (emptyEl) emptyEl.remove();

    const tmp = document.createElement('div');
    tmp.innerHTML = renderTopicRow(newTopic);
    listEl.appendChild(tmp.firstElementChild);

    editTopic(newId);
    document.getElementById('topic-form-' + newId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ─── Export / Import / Reset ─── */
  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'learning-tracker-backup.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported.');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (!imported.topics || !Array.isArray(imported.topics)) throw new Error('Invalid format');
        data = imported;
        saveData();
        renderPage();
        toast('Imported successfully.');
      } catch(err) {
        alert('Import failed: invalid JSON file.\n' + err.message);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function resetDefaults() {
    if (!confirm('Reset everything back to the original defaults? All your changes will be lost.')) return;
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData();
    renderPage();
    toast('Reset to defaults.');
  }

  /* ─── Init ─── */
  renderPage();
</script>
</body>
</html>
